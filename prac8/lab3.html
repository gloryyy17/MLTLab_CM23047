<!DOCTYPE html>
<html>
<head>
  <title>Incremental Learning</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>

<body>
<h2>Incremental Learning</h2>

<video id="webcam" autoplay width="250"></video><br>

<button onclick="addExample(0)">Apple</button>
<button onclick="addExample(1)">Banana</button>
<button onclick="addExample(2)">Orange</button>
<button onclick="addExample(3)">Mango 🥭</button><br><br>

<button onclick="train()">Train</button>
<button onclick="evaluate()">Evaluate</button>

<pre id="output"></pre>

<script>
let net, webcam, xs=[], ys=[], model;
let numClasses = 4;

async function init(){
  net = await mobilenet.load();
  webcam = await tf.data.webcam(document.getElementById("webcam"));
}
init();

async function addExample(label){
  const img = await webcam.capture();
  const act = net.infer(img,true);
  xs.push(act);
  ys.push(label);
}

async function train(){
  const x = tf.concat(xs);
  const y = tf.oneHot(tf.tensor1d(ys,'int32'), numClasses);

  model = tf.sequential();
  model.add(tf.layers.dense({inputShape:[1024], units:100, activation:'relu'}));
  model.add(tf.layers.dense({units:numClasses, activation:'softmax'}));

  model.compile({
    optimizer: tf.train.adam(0.0001),
    loss:'categoricalCrossentropy',
    metrics:['accuracy']
  });

  await model.fit(x,y,{epochs:15});
}

async function evaluate(){
  const x = tf.concat(xs);
  const preds = model.predict(x).argMax(1).dataSync();

  let correct = 0;

  for(let i=0;i<preds.length;i++){
    if(preds[i] === ys[i]) correct++;
  }

  let acc = correct / preds.length;

  document.getElementById("output").innerText =
    "Accuracy after adding new class: " + acc.toFixed(2) +
    "\nObservation: Accuracy may drop initially due to new class.";
}
</script>
</body>
</html>
