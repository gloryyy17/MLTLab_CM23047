<!DOCTYPE html>
<html>
<head>
  <title>Fruit Classifier - Training</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>

<body>
<h2>Train Model (Apple, Banana, Orange)</h2>

<video id="webcam" autoplay playsinline width="250"></video><br>

<button onclick="addExample(0)">Apple</button>
<button onclick="addExample(1)">Banana</button>
<button onclick="addExample(2)">Orange</button><br><br>

<button onclick="train()">Train</button>

<script>
let net, webcam, xs = [], ys = [], model;

async function init() {
  net = await mobilenet.load();
  webcam = await tf.data.webcam(document.getElementById("webcam"));
}
init();

async function addExample(label) {
  const img = await webcam.capture();
  const act = net.infer(img, true);
  xs.push(act);
  ys.push(label);
}

async function train() {
  const x = tf.concat(xs);
  const y = tf.oneHot(tf.tensor1d(ys, 'int32'), 3);

  model = tf.sequential();
  model.add(tf.layers.dense({inputShape:[1024], units:100, activation:'relu'}));
  model.add(tf.layers.dense({units:3, activation:'softmax'}));

  model.compile({
    optimizer: tf.train.adam(0.0001),
    loss: 'categoricalCrossentropy',
    metrics: ['accuracy']
  });

  await model.fit(x, y, {epochs:15});

  alert("Training Complete");
}
</script>
</body>
</html>
