<!DOCTYPE html>
<html>
<head>
  <title>Lab 3 - CNN vs Dense</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
</head>
<body>

<h2>Lab 3: CNN vs Dense Network</h2>
<div id="output"></div>

<script>
async function loadMnist() {
  const response = await fetch(
    "https://storage.googleapis.com/tfjs-examples/mnist-data/mnist.json"
  );
  return await response.json();
}

function createCNN() {
  const model = tf.sequential();
  model.add(tf.layers.conv2d({
    inputShape:[28,28,1],
    filters:8,
    kernelSize:5,
    activation:'relu'
  }));
  model.add(tf.layers.maxPooling2d({poolSize:2}));
  model.add(tf.layers.flatten());
  model.add(tf.layers.dense({units:32,activation:'relu'}));
  model.add(tf.layers.dense({units:10,activation:'softmax'}));
  return model;
}

function createDense() {
  const model = tf.sequential();
  model.add(tf.layers.flatten({inputShape:[28,28,1]}));
  model.add(tf.layers.dense({units:128,activation:'relu'}));
  model.add(tf.layers.dense({units:10,activation:'softmax'}));
  return model;
}

async function trainModel(model, trainImages, trainLabels, testImages, testLabels) {
  model.compile({
    optimizer:'adam',
    loss:'categoricalCrossentropy',
    metrics:['accuracy']
  });

  await model.fit(trainImages, trainLabels, { epochs:5 });

  const evalResult = model.evaluate(testImages, testLabels);
  return (await evalResult[1].data())[0];
}

async function run() {
  const data = await loadMnist();

  const trainImages = tf.tensor4d(data.trainImages,[60000,28,28,1]);
  const trainLabels = tf.tensor2d(data.trainLabels,[60000,10]);
  const testImages = tf.tensor4d(data.testImages,[10000,28,28,1]);
  const testLabels = tf.tensor2d(data.testLabels,[10000,10]);

  const cnnAcc = await trainModel(
    createCNN(),
    trainImages, trainLabels,
    testImages, testLabels
  );

  const denseAcc = await trainModel(
    createDense(),
    trainImages, trainLabels,
    testImages, testLabels
  );

  document.getElementById("output").innerHTML = `
    CNN Accuracy: ${cnnAcc.toFixed(4)}<br>
    Dense Accuracy: ${denseAcc.toFixed(4)}<br><br>
    <b>Conclusion:</b> CNN performs better for image data.
  `;
}

run();
</script>

</body>
</html>
