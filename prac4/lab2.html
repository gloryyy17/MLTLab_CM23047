<!DOCTYPE html>
<html>
<head>
  <title>Lab 2 - Draw & Predict</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <style>
    body { text-align:center; font-family:Arial; }
    canvas { border:2px solid black; background:black; }
    button { margin:10px; padding:10px; }
  </style>
</head>
<body>

<h2>Lab 2: Draw Digit (0-9)</h2>

<canvas id="canvas" width="280" height="280"></canvas><br>
<button onclick="clearCanvas()">Clear</button>
<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<script>
let model;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 15;
ctx.lineCap = "round";
ctx.strokeStyle = "white";

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;
canvas.onmousemove = e => {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

function clearCanvas() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

async function loadModel() {
  model = await tf.loadLayersModel(
    "https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
  );
}
loadModel();

async function predict() {
  const img = tf.browser.fromPixels(canvas,1)
    .resizeNearestNeighbor([28,28])
    .toFloat()
    .div(255.0)
    .expandDims(0);

  const prediction = model.predict(img);
  const result = prediction.argMax(1).dataSync()[0];

  document.getElementById("result").innerText =
    "Prediction: " + result;
}
</script>

</body>
</html>
