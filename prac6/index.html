<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PoseNet Demo</title>

  <!-- Use compatible versions -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.8.6/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #fff;
      font-family: sans-serif;
      display: flex; flex-direction: column;
      align-items: center; padding: 20px;
      gap: 12px;
    }
    h1 { font-size: 20px; font-weight: 500; }
    #status {
      font-size: 13px; color: #ffcc00;
      text-align: center;
    }
    #error-box {
      display: none;
      background: #3a0000; border: 1px solid #ff4444;
      color: #ff8888; font-size: 12px;
      padding: 10px 14px; border-radius: 6px;
      max-width: 640px;
      font-family: monospace; white-space: pre-wrap;
    }
    #container {
      position: relative; width: 640px; height: 480px;
    }
    /* Hide the raw video — canvas does all the rendering */
    video {
      display: none;
    }
    canvas {
      position: absolute; top: 0; left: 0;
      width: 640px; height: 480px;
      border-radius: 8px;
      /* Mirror the canvas so it looks natural (selfie view) */
      transform: scaleX(-1);
    }
    #info { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>PoseNet — Pose Detection</h1>
  <p id="status">Initialising...</p>
  <div id="error-box"></div>

  <div id="container">
    <!-- Video is hidden; used only as image source for canvas & model -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <p id="info">🟢 Green dots = keypoints &nbsp;|&nbsp; 🟠 Orange lines = skeleton</p>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const errorBox = document.getElementById('error-box');

function setStatus(msg, color) {
  statusEl.textContent = msg;
  statusEl.style.color = color || '#ffcc00';
}

function showError(msg) {
  errorBox.style.display = 'block';
  errorBox.textContent = 'ERROR: ' + msg;
  setStatus('Something went wrong — see error above.', '#ff4444');
}

// Skeleton pairs (keypoint index → index)
// See: https://github.com/tensorflow/tfjs-models/tree/master/posenet
const SKELETON = [
  [0,1],[0,2],[1,3],[2,4],           // head
  [5,6],[5,7],[7,9],[6,8],[8,10],    // arms
  [5,11],[6,12],[11,12],             // torso
  [11,13],[13,15],[12,14],[14,16]    // legs
];

const SCORE_THRESHOLD = 0.3;

// ── Step 1: Camera setup ──────────────────────────────────────────────────
async function setupCamera() {
  setStatus('Requesting camera permission...');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false
    });
  } catch (e) {
    throw new Error(
      'Camera access denied or unavailable.\n' +
      'Please allow camera permission and reload.\n\n' + e.message
    );
  }

  video.srcObject = stream;

  // Await both metadata and the video actually playing
  await new Promise((resolve, reject) => {
    video.onloadedmetadata = () => {
      video.play().then(resolve).catch(reject);
    };
  });

  setStatus('Camera ready. Loading PoseNet model...');
}

// ── Step 2: Load model ────────────────────────────────────────────────────
async function loadModel() {
  const net = await posenet.load({
    architecture: 'MobileNetV1',
    outputStride: 16,
    inputResolution: { width: 640, height: 480 },
    multiplier: 0.75   // balanced speed vs. accuracy
  });
  return net;
}

// ── Drawing helpers ───────────────────────────────────────────────────────
function drawPoint(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, 2 * Math.PI);
  ctx.fillStyle = '#00FF88';
  ctx.fill();
  ctx.strokeStyle = '#007744';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawSkeleton(kps) {
  ctx.strokeStyle = '#FF6B35';
  ctx.lineWidth = 2.5;
  SKELETON.forEach(([a, b]) => {
    const ka = kps[a], kb = kps[b];
    if (ka.score > SCORE_THRESHOLD && kb.score > SCORE_THRESHOLD) {
      ctx.beginPath();
      ctx.moveTo(ka.position.x, ka.position.y);
      ctx.lineTo(kb.position.x, kb.position.y);
      ctx.stroke();
    }
  });
}

// ── Step 3: Detection loop ────────────────────────────────────────────────
function detectLoop(net) {
  async function loop() {
    try {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        // FIX: flipHorizontal:false because we flip the CANVAS with CSS.
        // If you flip both the canvas AND pass flipHorizontal:true, coords double-mirror.
        const pose = await net.estimateSinglePose(video, {
          flipHorizontal: false
        });

        // Draw mirrored video frame onto canvas
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -640, 0, 640, 480);
        ctx.restore();

        // Draw skeleton & keypoints (coords match unflipped video pixels;
        // the CSS scaleX(-1) on the canvas mirrors everything together)
        drawSkeleton(pose.keypoints);
        pose.keypoints.forEach(kp => {
          if (kp.score > SCORE_THRESHOLD) drawPoint(kp.position.x, kp.position.y);
        });

        // Show score
        setStatus(
          `Detecting… confidence: ${(pose.score * 100).toFixed(0)}%`,
          pose.score > 0.4 ? '#00FF88' : '#ffcc00'
        );
      }
    } catch (e) {
      console.warn('Frame error:', e);
    }
    requestAnimationFrame(loop);
  }
  loop();
}

// ── Main ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    if (typeof posenet === 'undefined') {
      throw new Error(
        'PoseNet library failed to load.\n' +
        'Check your internet connection and that CDN scripts are not blocked.'
      );
    }

    await setupCamera();
    const net = await loadModel();
    setStatus('Model loaded! Stand in front of your camera.', '#00FF88');
    detectLoop(net);

  } catch (err) {
    showError(err.message || String(err));
    console.error(err);
  }
})();
</script>
</body>
</html>
