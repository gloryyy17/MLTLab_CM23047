<!DOCTYPE html>
<html>
<head>
  <title>Lab 2 - MobileNet Test on 5 Images</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

  <!-- MobileNet Model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    img {
      width: 220px;
      margin: 10px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 20px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>MobileNet - Test on 5 Internet Images</h2>
<button onclick="testImages()">Run Test</button>

<div id="images">
  <img src="https://storage.googleapis.com/tfjs-models/assets/cat.jpg" crossorigin="anonymous">
  <img src="https://storage.googleapis.com/tfjs-models/assets/dog.jpg" crossorigin="anonymous">
  <img src="https://storage.googleapis.com/tfjs-models/assets/cat.jpg" crossorigin="anonymous">
  <img src="https://storage.googleapis.com/tfjs-models/assets/dog.jpg" crossorigin="anonymous">
  <img src="https://storage.googleapis.com/tfjs-models/assets/cat.jpg" crossorigin="anonymous">
</div>

<div id="results"></div>

<script>
let model;

async function loadModel() {
  model = await mobilenet.load();
  console.log("MobileNet Loaded");
}

loadModel();

async function testImages() {

  if (!model) {
    alert("Model is still loading, please wait...");
    return;
  }

  const imgs = document.querySelectorAll("#images img");
  let output = "<h3>Predictions:</h3>";

  for (let img of imgs) {
    const predictions = await model.classify(img);
    output += `
      <p>
      <b>${predictions[0].className}</b>
      - ${(predictions[0].probability * 100).toFixed(2)}%
      </p>
    `;
  }

  document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
