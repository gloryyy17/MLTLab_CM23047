<!DOCTYPE html>
<html>
<head>
  <title>Lab 2 - Multiple Image Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <style>
    body { text-align:center; font-family: Arial; background:#222; color:white; }
    img { width:200px; margin:10px; }
    button { padding:10px 20px; }
  </style>
</head>
<body>

<h2>MobileNet - Test on 5 Images</h2>
<button onclick="testImages()">Run Test</button>

<div id="images">
  <img src="https://i.imgur.com/Bvro0YD.png" crossorigin="anonymous">
  <img src="https://i.imgur.com/5NZ6X3p.jpg" crossorigin="anonymous">
  <img src="https://i.imgur.com/9ooB60I.jpg" crossorigin="anonymous">
  <img src="https://i.imgur.com/ZF6s192.jpg" crossorigin="anonymous">
  <img src="https://i.imgur.com/OD9z2Xg.jpg" crossorigin="anonymous">
</div>

<div id="results"></div>

<script>
let model;

async function loadModel(){
  model = await mobilenet.load();
}
loadModel();

async function testImages(){
  const imgs = document.querySelectorAll("#images img");
  let output = "<h3>Predictions:</h3>";

  for (let img of imgs){
    const pred = await model.classify(img);
    output += `<p><b>${pred[0].className}</b> - ${(pred[0].probability*100).toFixed(2)}%</p>`;
  }

  document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
