<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Export & Import Model</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<style>
body { background: #f0f8ff; font-family: 'Segoe UI', sans-serif; }
.container { max-width: 500px; margin-top: 60px; padding: 30px; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; }
.status { margin-top: 15px; font-weight: 600; color: #198754; min-height: 24px; }
.output { font-weight: bold; font-size: 1.2rem; margin-top: 15px; min-height: 24px; color: #2a3e59; }
input[type=number], input[type=file] { width: 60%; margin: 10px 0; padding: 8px; border-radius: 6px; border: 1.5px solid #aaa; }
button { min-width: 120px; margin: 5px; }
</style>
</head>
<body>

<div class="container">
  <h2 class="text-success mb-3">Step 3: Export / Import</h2>
  <button class="btn btn-success mb-2" id="trainBtn">Train Model</button>
  <button class="btn btn-primary mb-2" id="exportBtn" disabled>Export Model</button>
  <br>
  <label for="importFiles">Select model.json + weights.bin</label><br>
  <input type="file" id="importFiles" multiple accept=".json,.bin"><br>
  <button class="btn btn-info" id="importBtn" disabled>Import Model</button>
  <br>
  <input type="number" id="inputX" placeholder="Enter X value">
  <button class="btn btn-secondary" id="predictBtn" disabled>Predict</button>
  <div class="output" id="output">Prediction: --</div>
  <div class="status" id="status">Waiting...</div>
</div>

<script>
let model = null;
let importedModel = null;

document.getElementById('trainBtn').onclick = async () => {
  const status = document.getElementById('status');
  status.innerText = "Training model...";
  model = tf.sequential();
  model.add(tf.layers.dense({units:1, inputShape:[1]}));
  model.compile({loss:'meanSquaredError', optimizer:'adam'});
  
  const xs = tf.tensor2d([1,2,3,4],[4,1]);
  const ys = tf.tensor2d([1,3,5,7],[4,1]);
  await model.fit(xs, ys, {epochs:300});
  status.innerText = "Model trained!";
  document.getElementById('exportBtn').disabled = false;
};

document.getElementById('exportBtn').onclick = async () => {
  if (!model) return alert("Train first!");
  document.getElementById('status').innerText = "Exporting model...";
  await model.save('downloads://my-tfjs-exported-model');
  document.getElementById('status').innerText = "Model exported! Check downloads.";
};

document.getElementById('importFiles').onchange = e => {
  document.getElementById('importBtn').disabled = e.target.files.length < 2;
};

document.getElementById('importBtn').onclick = async () => {
  const files = document.getElementById('importFiles').files;
  if (files.length < 2) return alert("Select model.json + weights.bin");
  const jsonFile = [...files].find(f => f.name.endsWith('.json'));
  const jsonURL = URL.createObjectURL(jsonFile);

  const status = document.getElementById('status');
  status.innerText = "Importing model...";
  try {
    importedModel = await tf.loadLayersModel(jsonURL);
    status.innerText = "Model imported!";
    document.getElementById('predictBtn').disabled = false;
  } catch(e) {
    status.innerText = "Import failed.";
    alert("Failed to import model: "+e.message);
  }
};

document.getElementById('predictBtn').onclick = () => {
  const val = parseFloat(document.getElementById('inputX').value);
  if (isNaN(val)) return alert("Enter valid number");
  const pred = importedModel.predict(tf.tensor2d([val],[1,1])).dataSync()[0].toFixed(3);
  document.getElementById('output').innerText = `Prediction: ${pred}`;
};
</script>

</body>
</html>
